<div class="flex h-screen overflow-hidden surface-ground">
  
  @if (sidebarVisible) {
    <div class="w-16rem bg-white border-right-1 surface-border flex flex-column transition-all transition-duration-300">
      
      <div class="h-4rem flex align-items-center justify-content-center border-bottom-1 surface-border">
        <span class="text-2xl font-bold text-primary flex align-items-center gap-2">
          <i class="pi pi-car text-2xl"></i> AutoLog
        </span>
      </div>
      
      <div class="flex-grow-1 overflow-y-auto py-3 px-2">
        <p-menu [model]="sidebarItems" class="w-full border-none"></p-menu>
      </div>
    </div>
  }

  <div class="flex flex-column flex-grow-1 h-full">
    
    <div class="h-4rem bg-white border-bottom-1 surface-border flex justify-content-between align-items-center px-4 shadow-1 z-1">
      
      <p-button icon="pi pi-bars" (onClick)="toggleSidebar()" [text]="true" [rounded]="true" class="text-700"></p-button>
      
      <div class="flex align-items-center gap-3">
        
        <p-menu #profileMenu [model]="profileItems" [popup]="true"></p-menu>
        
        <p-avatar 
          image="https://ui-avatars.com/api/?name=User&background=random&color=fff" 
          shape="circle" 
          size="large"
          class="cursor-pointer transition-transform transition-duration-200 hover:scale-110" 
          (click)="profileMenu.toggle($event)">
        </p-avatar>

      </div>
    </div>

    <div class="flex-grow-1 overflow-y-auto p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
